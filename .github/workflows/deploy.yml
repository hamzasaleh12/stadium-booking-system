name: CI/CD for Stadium Booking

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'maven'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- 1. Testing Phase (Only on PR) ---
      - name: Run All Tests
        if: github.event_name == 'pull_request'
        run: ./mvnw verify

      # --- 2. Docker Validation (Only on PR) ---
      - name: Validate Docker Build
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- 3. Deployment Phase (Only on Push/Merge to Main) ---
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build And Push Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stadium-app:${{ github.sha }}

      - name: Update Hugging Face Metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
            git clone https://hamzasaleh:$HF_TOKEN@huggingface.co/spaces/hamzasaleh/Stadium-booking hf_space
            cd hf_space
            sed -i "s/version: .*/version: ${{ github.sha }}/" README.md
            git config user.name "github-actions"
            git config user.email "action@github.com"
            git add README.md
            git commit -m "Deploy version: ${{ github.sha }}"
            git push
