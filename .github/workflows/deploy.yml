name: CI/CD for Stadium Booking
on:
  push:
    branches: [ main ]
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
         java-version: '21'
         distribution: 'corretto'

      - name: Run Unit Tests
        run: mvn test -Dtest=!*ApplicationTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build And Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/stadium-app:latest

      - name: Restart Hugging Face Space
        run: |
          curl -X POST https://huggingface.co/api/spaces/hamzasaleh/Stadium-booking/restart \
          -H "Authorization: Bearer ${{ secrets.HUGGINGFACE_TOKEN }}"