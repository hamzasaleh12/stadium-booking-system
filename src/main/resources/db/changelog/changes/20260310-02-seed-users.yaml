databaseChangeLog:
  # 1. Super Admin Seeder
  - changeSet:
      id: 20260310-02-seed-admin
      author: hamza
      context: "local, prod"
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: 0
            sql: "SELECT COUNT(*) FROM users WHERE email = 'admin@gmail.com'"
      changes:
        - insert:
            tableName: users
            columns:
              - column: { name: id, valueComputed: "UUID_TO_BIN(UUID())" }
              - column: { name: version, valueNumeric: 0 }
              - column: { name: name, value: "Super Admin" }
              - column: { name: email, value: "admin@gmail.com" }
              - column: { name: phone_number, value: "01012345678" }
              - column: { name: password, value: "$2a$10$hoVkdEC12AnxJtGB9CN/Y.ucvJvlN5YwT6JvxMOmgQWhYY8YRA/GC" }
              - column: { name: dob, valueDate: "1995-01-01" }
              - column: { name: role, value: "ROLE_ADMIN" }
              - column: { name: is_deleted, valueBoolean: false }
              - column: { name: created_at, valueComputed: "CURRENT_TIMESTAMP" }

